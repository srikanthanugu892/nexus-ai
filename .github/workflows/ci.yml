name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install ruff
      - name: Lint
        run: ruff check src/

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: nexus_ai
          POSTGRES_USER: nexus
          POSTGRES_PASSWORD: nexus-dev-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nexus -d nexus_ai"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      neo4j:
        image: neo4j:5-community
        env:
          NEO4J_AUTH: neo4j/nexus-dev-password
        ports:
          - 7687:7687
        options: >-
          --health-cmd "cypher-shell -u neo4j -p nexus-dev-password 'RETURN 1'"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 10
          --health-start-period 30s

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Initialize database
        run: |
          PGPASSWORD=nexus-dev-password psql -h localhost -U nexus -d nexus_ai -f migrations/001_init.sql
      - name: Run tests
        env:
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: nexus-dev-password
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          POSTGRES_DB: nexus_ai
          POSTGRES_USER: nexus
          POSTGRES_PASSWORD: nexus-dev-password
          LITELLM_API_KEY: test-key
          LITELLM_ENDPOINT: http://localhost:4000
        run: pytest -v

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t nexus-ai .
